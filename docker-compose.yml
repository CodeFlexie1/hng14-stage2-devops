version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hng_network

  api:
    build: ./api
    restart: always
    # ADDED PORTS SO YOU CAN TEST FROM THE HOST
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - hng_network

  worker:
    build: ./worker
    restart: always
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - hng_network

  frontend:
    build: ./frontend
    # USING 3001 TO AVOID THE "ADDRESS ALREADY IN USE" ERROR
    ports:
      - "3001:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # INTERNAL CHECK: The app inside is still on 3000
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - hng_network

networks:
  hng_network:
    name: hng_internal_network
