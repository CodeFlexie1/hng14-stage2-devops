version: '3.8'

# 1. Named Internal Network
networks:
  hng_network:
    driver: bridge

services:
  redis:
    image: redis:alpine
    restart: always
    networks:
      - hng_network
    # Redis needs a healthcheck so other services know when it is actually ready
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  api:
    build: ./api
    ports:
      - "${API_PORT:-8000}:8000"
    restart: always
    networks:
      - hng_network
    # 2. Strict Startup
    depends_on:
      redis:
        condition: service_healthy
    # 3. No Hardcoded Configs
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  # 4. The Missing Worker Service
  worker:
    build: ./worker
    restart: always
    networks:
      - hng_network
    depends_on:
      redis:
        condition: service_healthy
      api: # Worker shouldn't start until the API is healthy either
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    restart: always
    networks:
      - hng_network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
