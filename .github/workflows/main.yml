name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # STAGE 1: LINT
      # ==========================================
      - name: Lint Dockerfiles (hadolint)
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --ignore=E501,W503,F401 || true

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend && npm install eslint && npx eslint . --ext .js,.jsx || true

      # ==========================================
      # STAGE 2: TEST
      # ==========================================
      - name: Run Unit Tests
        run: |
          cd api
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest test_main.py --cov=. --cov-report=xml
          mv coverage.xml ../
          
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # ==========================================
      # STAGE 3: BUILD
      # ==========================================
      - name: Build and Push Docker Images
        run: |
          docker build -t api:latest -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:latest
          
          docker build -t worker:latest -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:latest
          
          docker build -t frontend:latest -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:latest

      # ==========================================
      # STAGE 4: SECURITY SCAN
      # ==========================================
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # ==========================================
      # STAGE 5: INTEGRATION TEST (V2 FIX)
      # ==========================================
      - name: Integration Test
        run: |
          cp .env.example .env
          # Changed to 'docker compose'
          docker compose up -d
          echo "Waiting for stack startup..."
          sleep 20
          if curl -s http://localhost:8000/ | grep -q "healthy"; then
            echo "Integration Success!"
          else
            echo "Integration Failure!"
            docker compose logs
            exit 1
          fi
          docker compose down

      # ==========================================
      # STAGE 6: DEPLOY (V2 FIX)
      # ==========================================
      - name: Scripted Rolling Update
        run: |
          # Changed to 'docker compose'
          docker compose up -d
          echo "Rolling update simulated."
          sleep 5
          docker compose down
