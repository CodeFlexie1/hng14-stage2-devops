name: CI/CD Pipeline

on:
  push:
    branches:
      - main

# NEW: This gives the robot permission to upload security reports
permissions:
  contents: read
  security-events: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles (hadolint)
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --ignore=E501,W503,F401 || true

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm install eslint
          npx eslint . --ext .js,.jsx || true

      # ==========================================
      # STAGE 2: TEST (FIXED PATHS)
      # ==========================================
      - name: Run Unit Tests
        env:
          # NEW: This tells Python to look inside the 'api' folder for your code
          PYTHONPATH: ${{ github.workspace }}/api
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx
          # Run pytest from the root but tell it where the tests are
          pytest api/test_main.py --cov=api --cov-report=xml
          
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # ==========================================
      # STAGE 3: BUILD
      # ==========================================
      - name: Build and Push Docker Images
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:latest
          
          docker build -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:latest
          
          docker build -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:latest

      # ==========================================
      # STAGE 4: SECURITY SCAN (FIXED PERMISSIONS)
      # ==========================================
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Upload even if the scan found issues
        with:
          sarif_file: 'trivy-results.sarif'

      # ==========================================
      # STAGE 5: INTEGRATION TEST
      # ==========================================
      - name: Integration Test
        run: |
          cp .env.example .env
          docker-compose up -d
          echo "Waiting for full stack startup..."
          sleep 20
          
          # Simple check to see if API is responding
          if curl -s http://localhost:8000/ | grep -q "healthy"; then
            echo "Integration Test Passed!"
          else
            echo "Integration Test Failed!"
            docker-compose logs
            exit 1
          fi
          docker-compose down

      # ==========================================
      # STAGE 6: DEPLOY
      # ==========================================
      - name: Scripted Rolling Update
        run: |
          docker-compose up -d
          echo "Simulating rolling update..."
          sleep 10
          docker-compose down
