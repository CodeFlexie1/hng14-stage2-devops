version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: always
    networks:
      - hng_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: always
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - hng_network

  worker:
    build: ./worker
    restart: always
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - hng_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - hng_network

networks:
  hng_network:
    name: hng_internal_network
